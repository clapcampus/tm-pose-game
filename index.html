<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Teachable Machine Pose Model</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>Fruit Catcher Game</h1>
    <div class="main-container">
      <!-- 왼쪽 패널: 설정 및 웹캠 -->
      <div class="left-panel">
        <h2>Webcam & Controls</h2>
        <div class="button-container">
          <button type="button" id="startBtn" onclick="init()">Start Game</button>
          <button type="button" id="stopBtn" onclick="stop()" disabled>Stop</button>
        </div>
        <div class="canvas-container">
          <canvas id="webcam-canvas"></canvas>
          <div id="pose-label">Waiting...</div>
        </div>
        <div id="label-container"></div>
      </div>

      <!-- 오른쪽 패널: 게임 화면 -->
      <div class="right-panel">
        <h2>Game Area</h2>
        <div class="game-info">
          <span>Score: <span id="score-display">0</span></span>
          <span>Level: <span id="level-display">1</span></span>
          <span>Time: <span id="time-display">0</span></span>
        </div>
        <div class="canvas-wrapper">
          <canvas id="game-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Teachable Machine 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

    <!-- 애플리케이션 모듈 -->
    <script src="./js/stabilizer.js"></script>
    <script src="./js/poseEngine.js"></script>
    <script src="./js/gameEngine.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
